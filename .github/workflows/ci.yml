name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Code formatieren prüfen (Black)
        run: black --check src/ tests/ main.py

      - name: Code linten prüfen (Ruff)
        run: ruff check src/ tests/ main.py

      - name: Tests ausführen (Unit- und Integrationtests)
        env:
          PYTHONPATH: src
        run: python -m unittest discover -v -s tests

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Docker Image bauen (Test)
        run: docker build -t pv-dashboard:latest .
